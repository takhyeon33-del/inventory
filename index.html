<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>태진지엔에스 재고현황</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f3}
.app{max-width:960px;margin:0 auto;padding:24px 20px}

/* 토큰 입력 배너 */
.token-banner{background:#1a1a1a;color:#fff;border-radius:12px;padding:24px;margin-bottom:24px}
.token-banner h2{font-size:16px;font-weight:600;margin-bottom:6px}
.token-banner p{font-size:12px;color:#aaa;margin-bottom:16px;line-height:1.6}
.token-input-row{display:flex;gap:8px}
.token-input-row input{flex:1;padding:10px 14px;border:1px solid #444;border-radius:8px;font-size:13px;background:#2a2a2a;color:#fff;outline:none}
.token-input-row input::placeholder{color:#666}
.token-input-row input:focus{border-color:#888}
.token-input-row button{padding:10px 20px;background:#fff;color:#1a1a1a;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.token-input-row button:hover{opacity:.9}

/* 헤더 */
.header{margin-bottom:20px}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.title{font-size:20px;font-weight:700}
.header-right{display:flex;align-items:center;gap:8px}
.sync-status{display:flex;align-items:center;gap:6px;font-size:12px;color:#888}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0}
.sync-dot.ok{background:#52c41a}
.sync-dot.err{background:#ff4d4f}
.sync-dot.loading{background:#faad14;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-refresh{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;font-size:12px;border:1px solid #d9d9d9;border-radius:8px;background:#fff;color:#555;cursor:pointer}
.btn-refresh:hover{background:#f5f5f5}
.btn-refresh:disabled{opacity:.5;cursor:not-allowed}
.btn-reset{font-size:11px;padding:4px 10px;border:1px solid #e0e0e0;border-radius:6px;background:#fff;color:#bbb;cursor:pointer}
.btn-reset:hover{color:#888}
.spin{display:inline-block;animation:spin .8s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.update-time{font-size:11px;color:#bbb}

/* 필터 */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:5px 14px;font-size:12px;border:1px solid #e8e8e8;border-radius:100px;background:#fff;color:#888;cursor:pointer}
.filter-btn:hover{border-color:#bbb;color:#555}
.filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

/* 카드 */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:12px;padding:14px;text-align:center;border:1px solid #e8e8e8}
.stat-num{font-size:22px;font-weight:700;margin-bottom:2px}
.stat-label{font-size:11px;color:#aaa}

/* 테이블 */
.table-wrap{background:#fff;border-radius:12px;border:1px solid #e8e8e8;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;border-bottom:2px solid #f0f0f0;font-weight:500;color:#aaa;font-size:11px;white-space:nowrap;background:#fafafa}
td{padding:10px 14px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr.main-row:hover td{background:#fafafa;cursor:pointer}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:100px;font-weight:500;white-space:nowrap}
.tag-freeze{background:#e6f4ff;color:#0958d9}
.tag-normal{background:#f6ffed;color:#389e0d}
.tag-move{background:#f9f0ff;color:#531dab}
.tag-식당용{background:#f6ffed;color:#389e0d}
.tag-통신판매용{background:#e6f4ff;color:#0958d9}
.tag-기타{background:#f5f5f5;color:#595959}
.tag-danger{background:#fff1f0;color:#cf1322}
.tag-warn{background:#fffbe6;color:#d46b08}
.chip{display:inline-block;font-size:11px;padding:2px 8px;border-radius:100px;border:1px solid #e8e8e8;background:#fafafa;color:#555}
.row-expired td{background:#fff1f0!important}
.row-urgent td{background:#fff8f6!important}
.row-warn-bg td{background:#fffef0!important}
.arrow{font-size:10px;color:#ccc;margin-left:4px;display:inline-block;transition:transform .2s}
.arrow.open{transform:rotate(90deg)}

/* 로트 상세 */
.lot-row{display:none}
.lot-inner{padding:8px 14px 8px 44px;background:#f9f9f9;border-bottom:1px solid #f0f0f0}
.lot-table{width:100%;font-size:12px;border-collapse:collapse}
.lot-table td{padding:4px 10px;border-bottom:1px solid #f0f0f0;color:#555}
.lot-table tr:last-child td{border-bottom:none}
.lot-header td{color:#bbb;font-weight:500;font-size:11px}

.empty{text-align:center;padding:48px;color:#bbb;font-size:13px}

@media(max-width:600px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  th:nth-child(7),td:nth-child(7){display:none}
}
</style>
</head>
<body>
<div class="app">

  <!-- 토큰 입력 배너 -->
  <div id="tokenBanner" style="display:none">
    <div class="token-banner">
      <h2>🔑 Notion 토큰 입력</h2>
      <p>처음 한 번만 입력하면 이 브라우저에 저장됩니다.<br>탁현님께 토큰을 받아서 입력해주세요.</p>
      <div class="token-input-row">
        <input type="password" id="tokenInput" placeholder="ntn_xxxxxxxx..." onkeydown="if(event.key==='Enter')saveToken()"/>
        <button onclick="saveToken()">저장</button>
      </div>
    </div>
  </div>

  <!-- 메인 콘텐츠 -->
  <div id="mainContent" style="display:none">
    <div class="header">
      <div class="header-top">
        <div class="title">🏭 태진지엔에스 재고현황</div>
        <div class="header-right">
          <span class="sync-status">
            <div class="sync-dot" id="syncDot"></div>
            <span id="syncMsg">로딩 중...</span>
          </span>
          <button class="btn-refresh" id="refreshBtn" onclick="loadAndRender()">
            <span id="refreshIcon">↻</span> 새로고침
          </button>
          <button class="btn-reset" onclick="resetToken()">토큰 재설정</button>
        </div>
      </div>
      <div class="update-time" id="updateTime"></div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('')"  id="f-all">전체</button>
      <button class="filter-btn" onclick="setFilter('식당용')"     id="f-식당용">식당용</button>
      <button class="filter-btn" onclick="setFilter('통신판매용')" id="f-통신판매용">통신판매용</button>
      <button class="filter-btn" onclick="setFilter('기타')"      id="f-기타">기타</button>
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>제품명</th><th>카테고리</th><th>규격</th>
          <th style="text-align:right">자사 창고</th>
          <th style="text-align:right">천일냉동</th>
          <th style="text-align:right">합계</th>
          <th style="text-align:right">합계(kg)</th>
          <th>상태</th>
        </tr></thead>
        <tbody id="invBody">
          <tr><td colspan="8" class="empty">데이터를 불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const TX_DB  = '4950b260843546dc987252e339176677';
const MAP_DB = '74665fa3444b42b583885d654a9aa587';
const CAT_ORD = {식당용:0,통신판매용:1,기타:2};
const today = new Date().toISOString().split('T')[0];

let TOKEN = '';
let cache = {transactions:[], mappings:[]};
let currentFilter = '';

// ── 초기화 ──────────────────────────────────
function init(){
  TOKEN = localStorage.getItem('notion_viewer_token') || '';
  if(!TOKEN){
    document.getElementById('tokenBanner').style.display = 'block';
  } else {
    document.getElementById('mainContent').style.display = 'block';
    loadAndRender();
    setInterval(loadAndRender, 5*60*1000);
  }
}

function saveToken(){
  const t = document.getElementById('tokenInput').value.trim();
  if(!t){alert('토큰을 입력해주세요');return;}
  TOKEN = t;
  localStorage.setItem('notion_viewer_token', t);
  document.getElementById('tokenBanner').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
  loadAndRender();
  setInterval(loadAndRender, 5*60*1000);
}

function resetToken(){
  if(!confirm('토큰을 초기화하시겠습니까?'))return;
  localStorage.removeItem('notion_viewer_token');
  location.reload();
}

// ── API ─────────────────────────────────────
async function nReq(method, path, body){
  const r = await fetch('https://notion-proxy.kimtakhyeon.workers.dev/v1'+path,{
    method,
    headers:{'Authorization':'Bearer '+TOKEN,'Notion-Version':'2022-06-28','Content-Type':'application/json'},
    body: body ? JSON.stringify(body) : undefined
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||'HTTP '+r.status);}
  return r.json();
}
async function nQuery(dbId, sorts){
  const body={page_size:100};if(sorts)body.sorts=sorts;
  const results=[];let cursor;
  do{
    if(cursor)body.start_cursor=cursor;
    const res=await nReq('POST','/databases/'+dbId+'/query',body);
    results.push(...res.results);cursor=res.has_more?res.next_cursor:null;
  }while(cursor);
  return results;
}
function gp(page,name){
  const p=page.properties[name];if(!p)return'';
  if(p.type==='title')    return p.title.map(t=>t.plain_text).join('');
  if(p.type==='rich_text')return p.rich_text.map(t=>t.plain_text).join('');
  if(p.type==='select')   return p.select?.name||'';
  if(p.type==='number')   return p.number||0;
  if(p.type==='date')     return p.date?.start||'';
  return'';
}
function sync(status,msg){
  document.getElementById('syncDot').className='sync-dot '+status;
  document.getElementById('syncMsg').textContent=msg;
}

// ── 로드 ─────────────────────────────────────
async function loadAndRender(){
  const btn=document.getElementById('refreshBtn');
  const icon=document.getElementById('refreshIcon');
  if(btn)btn.disabled=true;
  if(icon){icon.className='spin';icon.textContent='↻';}
  sync('loading','동기화 중...');
  try{
    const txP=await nQuery(TX_DB,[{property:'날짜',direction:'descending'}]);
    cache.transactions=txP.map(p=>({
      date:gp(p,'날짜'),type:gp(p,'구분'),product:gp(p,'제품명'),
      spec:gp(p,'규격'),cat:gp(p,'카테고리'),qty:gp(p,'수량'),
      loc:gp(p,'위치'),exp:gp(p,'소비기한'),
    })).filter(t=>t.date&&t.product);

    const mP=await nQuery(MAP_DB);
    cache.mappings=mP.map(p=>({
      alias:gp(p,'카카오표기명'),name:gp(p,'정식제품명'),
      spec:gp(p,'규격'),cat:gp(p,'카테고리'),
    })).filter(m=>m.alias&&!m.alias.startsWith('_'));

    const now=new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    sync('ok','동기화 완료');
    document.getElementById('updateTime').textContent='마지막 업데이트: '+now;
    renderAll();
  }catch(e){
    sync('err','오류: '+e.message);
    if(e.message.includes('401')){
      alert('토큰이 만료됐거나 잘못됐습니다. 토큰을 재설정해주세요.');
      resetToken();
    }
  }
  if(btn)btn.disabled=false;
  if(icon){icon.className='';icon.textContent='↻';}
}

// ── 재고 계산 ─────────────────────────────────
function buildInventory(){
  const sorted=[...cache.transactions].filter(t=>t.date&&t.date<=today).sort((a,b)=>a.date.localeCompare(b.date));
  const sI={},fI={};

  function kk(t){return t.product+'||'+t.spec+'||'+(t.exp||'');}
  function base(t){return{product:t.product,spec:t.spec,cat:t.cat,exp:t.exp||'',qty:0};}

  const snaps=sorted.filter(t=>t.type==='snapshot');
  if(snaps.length){
    const latD=[...new Set(snaps.map(t=>t.date))].sort().pop();
    snaps.filter(t=>t.date===latD).forEach(t=>{const k=kk(t);if(!sI[k])sI[k]=base(t);sI[k].qty+=t.qty;});
    sorted.filter(t=>t.date>=latD&&t.type!=='snapshot'&&t.type!=='freeze-set'&&t.type!=='in'&&t.type!=='out').forEach(t=>{
      const k=kk(t);
      if(t.type==='move-in'){if(!fI[k])fI[k]=base(t);fI[k].qty-=t.qty;if(!sI[k])sI[k]=base(t);sI[k].qty+=t.qty;}
      else if(t.type==='move-out'){if(!sI[k])sI[k]=base(t);sI[k].qty-=t.qty;if(!fI[k])fI[k]=base(t);fI[k].qty+=t.qty;}
      else if(t.type==='adjust'){if(t.loc==='천일'){if(!fI[k])fI[k]=base(t);fI[k].qty=t.qty;}else{if(!sI[k])sI[k]=base(t);sI[k].qty=t.qty;}}
    });
  }
  const frzSets=sorted.filter(t=>t.type==='freeze-set');
  if(frzSets.length){
    const latest={};
    frzSets.forEach(t=>{const k=kk(t);if(!latest[k]||t.date>=latest[k].date)latest[k]=t;});
    Object.values(latest).forEach(t=>{fI[kk(t)]={...base(t),qty:t.qty};});
  }

  const result={};
  const add=(i,loc)=>{
    const mi=cache.mappings.find(m=>m.name===i.product);
    const spec=mi?mi.spec:i.spec;
    const cat=mi?mi.cat:i.cat;
    const rk=i.product+'||'+spec;
    if(!result[rk])result[rk]={product:i.product,spec,cat,자사:0,천일:0,lots:[]};
    result[rk][loc]+=i.qty;
    if(i.exp){
      const lk=loc+'||'+i.exp;
      const ex=result[rk].lots.find(l=>l.key===lk);
      if(ex)ex.qty+=i.qty;
      else result[rk].lots.push({key:lk,loc,exp:i.exp,qty:i.qty});
    }
  };
  Object.values(sI).filter(i=>i.qty>0).forEach(i=>add(i,'자사'));
  Object.values(fI).filter(i=>i.qty>0).forEach(i=>add(i,'천일'));
  return result;
}

function calcKg(spec,qty){
  if(!spec||!qty)return null;
  const kM=spec.match(/([\d.]+)\s*kg/i);if(kM)return Math.round(parseFloat(kM[1])*qty*10)/10;
  const gM=spec.match(/([\d.]+)\s*g/i); if(gM)return Math.round(parseFloat(gM[1])*qty/100)/10;
  return null;
}

function expStatus(exp){
  if(!exp)return{cls:'',tag:''};
  const d=(new Date(exp)-new Date())/86400000;
  if(d<0)  return{cls:'row-expired',  tag:'<span class="tag tag-danger">만료</span>'};
  if(d<30) return{cls:'row-urgent',   tag:'<span class="tag tag-danger">임박</span>'};
  if(d<90) return{cls:'row-warn-bg',  tag:'<span class="tag tag-warn">주의</span>'};
  return{cls:'',tag:''};
}

// ── 필터 ─────────────────────────────────────
function setFilter(cat){
  currentFilter=cat;
  ['all','식당용','통신판매용','기타'].forEach(c=>{
    const el=document.getElementById(c==='all'?'f-all':'f-'+c);
    if(el)el.classList.toggle('active',(cat===''&&c==='all')||(cat===c));
  });
  renderAll();
}

// ── 렌더링 ────────────────────────────────────
function renderAll(){
  const invMap=buildInventory();
  let rows=Object.values(invMap);
  if(currentFilter)rows=rows.filter(r=>r.cat===currentFilter);
  rows.sort((a,b)=>(CAT_ORD[a.cat]??9)-(CAT_ORD[b.cat]??9)||a.product.localeCompare(b.product,'ko'));

  const total=rows.reduce((s,r)=>s+r.자사+r.천일,0);
  const self =rows.reduce((s,r)=>s+r.자사,0);
  const frz  =rows.reduce((s,r)=>s+r.천일,0);
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-num">${total.toLocaleString()}</div><div class="stat-label">총 재고${currentFilter?' ('+currentFilter+')':''}</div></div>
    <div class="stat-card"><div class="stat-num">${self.toLocaleString()}</div><div class="stat-label">자사 창고</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#0958d9">${frz.toLocaleString()}</div><div class="stat-label">천일냉동</div></div>
    <div class="stat-card"><div class="stat-num">${rows.length}</div><div class="stat-label">SKU 수</div></div>`;

  if(!rows.length){
    document.getElementById('invBody').innerHTML='<tr><td colspan="8" class="empty">재고가 없습니다.</td></tr>';
    return;
  }

  let html='';
  rows.forEach((r,i)=>{
    const kg=calcKg(r.spec,r.자사+r.천일);
    const hasLots=r.lots&&r.lots.length>0;
    const minExp=hasLots?r.lots.map(l=>l.exp).filter(Boolean).sort()[0]:'';
    const es=expStatus(minExp);
    const st=r.천일>0&&r.자사>0?'혼합':r.천일>0?'냉동':'자사';
    const sc=r.천일>0&&r.자사>0?'tag-move':r.천일>0?'tag-freeze':'tag-normal';

    html+=`<tr class="main-row ${es.cls}" onclick="toggleLot(${i})">
      <td><strong>${r.product}</strong>${hasLots?'<span class="arrow" id="arr-'+i+'">▶</span>':''}</td>
      <td><span class="tag tag-${r.cat}">${r.cat}</span></td>
      <td><span class="chip">${r.spec}</span></td>
      <td style="text-align:right;font-weight:500">${r.자사>0?r.자사.toLocaleString()+'개':'—'}</td>
      <td style="text-align:right">${r.천일>0?'<span class="tag tag-freeze">'+r.천일.toLocaleString()+'개</span>':'—'}</td>
      <td style="text-align:right"><strong>${(r.자사+r.천일).toLocaleString()}개</strong></td>
      <td style="text-align:right;color:#666">${kg!==null?kg+'kg':'—'}</td>
      <td><span class="tag ${sc}">${st}</span> ${es.tag}</td>
    </tr>`;

    if(hasLots){
      const lotsSorted=r.lots.slice().sort((a,b)=>a.exp.localeCompare(b.exp));
      html+=`<tr class="lot-row" id="lot-${i}"><td colspan="8" style="padding:0">
        <div class="lot-inner">
          <table class="lot-table">
            <tr class="lot-header"><td>위치</td><td>수량</td><td>소비기한</td><td>상태</td></tr>
            ${lotsSorted.map(l=>{
              const les=expStatus(l.exp);
              return`<tr style="${les.cls==='row-expired'?'background:#fff1f0':les.cls==='row-urgent'?'background:#fff8f6':les.cls==='row-warn-bg'?'background:#fffef0':''}">
                <td><span class="tag ${l.loc==='천일'?'tag-freeze':'tag-normal'}">${l.loc}</span></td>
                <td style="font-weight:500">${l.qty.toLocaleString()}개</td>
                <td>${l.exp}</td>
                <td>${les.tag||'<span style="color:#bbb">양호</span>'}</td>
              </tr>`;
            }).join('')}
          </table>
        </div>
      </td></tr>`;
    }
  });
  document.getElementById('invBody').innerHTML=html;
}

function toggleLot(i){
  const row=document.getElementById('lot-'+i);
  const arr=document.getElementById('arr-'+i);
  if(!row)return;
  const open=row.style.display!=='table-row';
  row.style.display=open?'table-row':'none';
  if(arr)arr.classList.toggle('open',open);
}

init();
</script>
</body>
</html>
