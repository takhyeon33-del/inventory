<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>태진지엔에스 · 원료 수불부</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f6f3;
  --surface: #ffffff;
  --border: #e4e2db;
  --border2: #d0cdc4;
  --text: #1a1917;
  --muted: #6b6860;
  --hint: #9e9b94;
  --green: #2d6a4f;
  --green-bg: #eaf4ee;
  --red: #9b2335;
  --red-bg: #fdf0f1;
  --orange: #7a4100;
  --orange-bg: #fef3e2;
  --blue: #1a4f8a;
  --blue-bg: #edf4fd;
  --in-color: #2d6a4f;
  --out-color: #9b2335;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
}
.app { max-width: 1280px; margin: 0 auto; padding: 24px 20px; }

/* 상단 헤더 */
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.logo { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }
.title { font-size: 17px; font-weight: 600; color: var(--text); }
.sync-wrap { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--hint); }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--hint); }
.dot.ok { background: var(--green); }
.dot.err { background: var(--red); }
.dot.spin { background: var(--orange); animation: blink .9s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* 탭 */
.tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; gap: 0; }
.tab {
  padding: 9px 18px; font-size: 13px; font-weight: 500;
  color: var(--muted); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color .15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--text); }

/* 카드 */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; margin-bottom: 14px;
}
.card-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  background: #faf9f7;
}
.card-title { font-size: 13px; font-weight: 600; color: var(--text); }
.card-actions { display: flex; align-items: center; gap: 8px; }

/* 버튼 */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 13px; font-size: 12px; font-family: inherit;
  border: 1px solid var(--border2); border-radius: 7px;
  background: var(--surface); color: var(--text); cursor: pointer;
  transition: background .12s;
}
.btn:hover { background: var(--bg); }
.btn-primary { background: var(--text); color: #fff; border-color: var(--text); }
.btn-primary:hover { opacity: .85; background: var(--text); }
.btn-sm { padding: 4px 10px; font-size: 11px; }

/* 셀렉트/인풋 공통 */
select, input[type=text], input[type=number], input[type=date] {
  font-family: inherit; font-size: 12px;
  padding: 5px 9px; border: 1px solid var(--border2);
  border-radius: 7px; background: var(--surface); color: var(--text);
  outline: none;
}
select:focus, input:focus { border-color: var(--text); }

/* 섹션 레이블 */
.sec-label {
  font-size: 11px; font-weight: 600; color: var(--muted);
  letter-spacing: .05em; text-transform: uppercase;
  margin-bottom: 8px; margin-top: 4px;
}

/* 요약 카드 */
.stat-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 18px; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.stat-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
.stat-val { font-size: 22px; font-weight: 600; color: var(--text); }
.stat-sub { font-size: 11px; color: var(--hint); margin-top: 2px; }
.stat.warn .stat-val { color: var(--orange); }
.stat.danger .stat-val { color: var(--red); }

/* 테이블 공통 */
table { width: 100%; border-collapse: collapse; }
th {
  padding: 7px 12px; text-align: left; font-size: 11px; font-weight: 600;
  color: var(--muted); background: #faf9f7;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 8px 12px; font-size: 12px; border-bottom: 1px solid var(--border);
  color: var(--text);
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: #faf9f7; }
.num { text-align: right; font-variant-numeric: tabular-nums; }
.muted { color: var(--muted); }

/* 뱃지/필 */
.pill {
  display: inline-block; font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 99px;
}
.pill-ok { background: var(--green-bg); color: var(--green); }
.pill-warn { background: var(--orange-bg); color: var(--orange); }
.pill-danger { background: var(--red-bg); color: var(--red); }
.pill-blue { background: var(--blue-bg); color: var(--blue); }

/* 수불부 테이블 */
.sb-wrap { overflow-x: auto; }
.sb-table { min-width: 900px; border-collapse: collapse; }
.sb-table th, .sb-table td {
  padding: 6px 10px; font-size: 11px;
  border: 1px solid var(--border); white-space: nowrap;
}
.sb-table th { background: #faf9f7; font-weight: 600; color: var(--muted); text-align: center; }
.sb-table td { text-align: right; font-variant-numeric: tabular-nums; }
.sb-table td.date { text-align: left; color: var(--muted); font-size: 11px; }
.sb-table .in { color: var(--in-color); font-weight: 500; }
.sb-table .used { color: var(--out-color); }
.sb-table .stock { color: var(--text); font-weight: 600; }
.sb-table .sum-row td { background: #faf9f7; font-weight: 600; }
.sb-table .group-head { background: #f3f1ec; font-size: 11px; }
.sb-dash { color: var(--hint); }

/* 폼 */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 16px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-label { font-size: 11px; font-weight: 600; color: var(--muted); }
.form-input { padding: 7px 10px; font-size: 13px; }
.form-full { grid-column: 1 / -1; }
.form-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

/* 패널 전환 */
.pane { display: none; }
.pane.active { display: block; }

/* 로딩/에러 */
.state-box { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; }

/* 토큰 배너 */
#token-banner {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: #1a1917;
  padding: 12px 24px;
  align-items: center; justify-content: space-between; gap: 12px;
}
#token-banner.show { display: flex; }
.token-banner-label { font-size: 12px; color: #aaa8a1; white-space: nowrap; }
.token-banner-input {
  flex: 1; max-width: 380px;
  padding: 7px 12px; font-size: 13px; font-family: inherit;
  background: #2d2c29; color: #fff;
  border: 1px solid #3d3c38; border-radius: 7px; outline: none;
}
.token-banner-input:focus { border-color: #666; }
.token-banner-btn {
  padding: 7px 16px; font-size: 12px; font-family: inherit; font-weight: 600;
  background: #fff; color: #1a1917;
  border: none; border-radius: 7px; cursor: pointer; white-space: nowrap;
}
.token-banner-btn:hover { background: #e8e6e0; }
.token-banner-notice { font-size: 11px; color: #6b6860; white-space: nowrap; }

/* 토스트 */
#toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--text); color: #fff;
  padding: 10px 18px; border-radius: 8px; font-size: 13px;
  opacity: 0; pointer-events: none; transition: opacity .2s;
  z-index: 999;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- 토큰 배너 -->
<div id="token-banner">
  <span class="token-banner-label">🔑 Notion 토큰 입력</span>
  <input class="token-banner-input" type="password" id="token-input" placeholder="ntn_xxxxxxxxxxxx..." autocomplete="off">
  <button class="token-banner-btn" id="token-save-btn">저장</button>
  <span class="token-banner-notice">이 브라우저에만 저장됩니다</span>
</div>

<div class="app" id="main-app">
  <!-- 헤더 -->
  <div class="header">
    <div class="header-left">
      <span class="logo">태진지엔에스</span>
      <span style="color:var(--border2)">·</span>
      <span class="title">원료 수불부</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="sync-wrap">
        <div class="dot spin" id="dot"></div>
        <span id="sync-txt">연결 중...</span>
      </div>
      <button class="btn" id="btn-logout" style="font-size:11px;padding:5px 10px;color:var(--muted)">로그아웃</button>
      <button class="btn btn-primary" id="btn-reg">+ 입출고 등록</button>
    </div>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <div class="tab active" data-tab="0">수불부 조회</div>
    <div class="tab" data-tab="1">원료 현황</div>
    <div class="tab" data-tab="2">입출고 등록</div>
  </div>

  <!-- 패널 0: 수불부 조회 -->
  <div class="pane active" id="pane-0">
    <div class="card">
      <div class="card-head">
        <span class="card-title">원료수불부</span>
        <div class="card-actions">
          <select id="sb-year">
            <option value="2026">2026년</option>
            <option value="2025">2025년</option>
          </select>
          <select id="sb-month">
            <option value="4">4월</option>
            <option value="3">3월</option>
            <option value="2">2월</option>
            <option value="1">1월</option>
          </select>
          <select id="sb-cat">
            <option value="">전체 원료</option>
            <option value="두부용 대두">두부용 대두</option>
            <option value="응고제">응고제</option>
            <option value="소포제">소포제</option>
            <option value="부원료">부원료</option>
            <option value="후라이드 전용">후라이드 전용</option>
          </select>
          <button class="btn btn-sm" id="btn-search">조회</button>
          <button class="btn btn-sm" id="btn-export">엑셀 내보내기</button>
        </div>
      </div>
      <div id="sb-body"><div class="state-box">조회 버튼을 눌러주세요</div></div>
    </div>
  </div>

  <!-- 패널 1: 원료 현황 -->
  <div class="pane" id="pane-1">
    <div class="stat-row" id="stat-row">
      <div class="stat"><div class="stat-label">전체 원료 종류</div><div class="stat-val" id="s-total">—</div><div class="stat-sub">품목</div></div>
      <div class="stat warn"><div class="stat-label">안전재고 미달</div><div class="stat-val" id="s-warn">—</div><div class="stat-sub">품목</div></div>
      <div class="stat danger"><div class="stat-label">마이너스 재고</div><div class="stat-val" id="s-minus">—</div><div class="stat-sub">품목</div></div>
      <div class="stat"><div class="stat-label">이번 달 입출고</div><div class="stat-val" id="s-tx">—</div><div class="stat-sub">건</div></div>
    </div>
    <div id="stock-body"><div class="state-box">데이터 불러오는 중...</div></div>
  </div>

  <!-- 패널 2: 입출고 등록 -->
  <div class="pane" id="pane-2">
    <div class="card">
      <div class="card-head"><span class="card-title">입출고 등록</span></div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">날짜</label>
          <input class="form-input" type="date" id="f-date">
        </div>
        <div class="form-group">
          <label class="form-label">구분</label>
          <select class="form-input" id="f-type">
            <option value="입고">입고</option>
            <option value="사용(생산투입)">사용 (생산투입)</option>
            <option value="재고조정">재고조정</option>
            <option value="폐기">폐기</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">원료 선택</label>
          <select class="form-input" id="f-raw">
            <option value="">— 로딩 중 —</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">수량 (kg)</label>
          <input class="form-input" type="number" id="f-qty" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group" id="bag-wrap" style="display:none">
          <label class="form-label">포대수 (자동계산)</label>
          <input class="form-input" type="text" id="f-bag" disabled placeholder="— 포" style="opacity:.5">
        </div>
        <div class="form-group">
          <label class="form-label">담당자</label>
          <input class="form-input" type="text" id="f-person" placeholder="">
        </div>
        <div class="form-group form-full">
          <label class="form-label">비고 (LOT번호, 공급업체 등)</label>
          <input class="form-input" type="text" id="f-note" placeholder="">
        </div>
      </div>
      <div class="form-footer">
        <button class="btn" id="btn-cancel">취소</button>
        <button class="btn btn-primary" id="btn-save">저장</button>
      </div>
    </div>
  </div>
</div><!-- /main-app -->

<div id="toast"></div>

<script>
// ============================================================
// 설정
// ============================================================
const PROXY      = 'https://notion-proxy.kimtakhyeon.workers.dev';
const NOTION_VER = '2022-06-28';
let TOKEN     = localStorage.getItem('notion_rawmaterial_token') || '';
let MASTER_DS = 'a944bc1c92da461ea25a7cee91b3f54a';
let TX_DS     = 'fbd7fbce4ef343d6b6a1a4482febbe4a';

// ============================================================
// 유틸
// ============================================================
function toast(msg, dur=2200) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}
function setSync(state, txt) {
  const d = document.getElementById('dot');
  const t = document.getElementById('sync-txt');
  d.className = 'dot ' + state; t.textContent = txt;
}
function fmt(n) {
  if (n === null || n === undefined || n === '') return '<span class="sb-dash">—</span>';
  if (n === 0) return '<span class="sb-dash">—</span>';
  return parseFloat(n).toLocaleString('ko-KR', {minimumFractionDigits:0, maximumFractionDigits:3});
}
function fmtNZ(n) {  // 0도 표시
  if (n === null || n === undefined || n === '') return '<span class="sb-dash">—</span>';
  return parseFloat(n).toLocaleString('ko-KR', {minimumFractionDigits:0, maximumFractionDigits:3});
}
function today() {
  return new Date().toISOString().slice(0,10);
}

// ============================================================
// Notion API
// ============================================================
async function notionQuery(dsId, filter, sorts=[]) {
  const url = `${PROXY}/v1/databases/${dsId.replace(/-/g,'')}/query`;
  const body = {};
  if (filter) body.filter = filter;
  if (sorts.length) body.sorts = sorts;
  body.page_size = 100;
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + TOKEN,
      'Notion-Version': NOTION_VER,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || '노션 오류');
  return data.results || [];
}

async function notionCreate(dsId, props) {
  const url = `${PROXY}/v1/pages`;
  const body = {
    parent: { database_id: dsId.replace(/-/g,'') },
    properties: props
  };
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + TOKEN,
      'Notion-Version': NOTION_VER,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || '저장 오류');
  return data;
}

// ============================================================
// 노션 페이지 파싱
// ============================================================
function getTitle(p, key) {
  return p.properties[key]?.title?.[0]?.plain_text || '';
}
function getRich(p, key) {
  return p.properties[key]?.rich_text?.[0]?.plain_text || '';
}
function getSelect(p, key) {
  return p.properties[key]?.select?.name || '';
}
function getNum(p, key) {
  return p.properties[key]?.number ?? null;
}
function getDate(p, key) {
  return p.properties[key]?.date?.start || '';
}

// ============================================================
// 마스터 데이터 캐시
// ============================================================
let MASTER = [];  // [{id, 원료명, 카테고리, 안전재고_kg, 포대당kg, ...}]
let TX_DATA = []; // 트랜잭션

async function loadMaster() {
  const rows = await notionQuery(MASTER_DS, null, [{property:'원료명', direction:'ascending'}]);
  MASTER = rows.map(p => ({
    id: p.id,
    원료명: getTitle(p, '원료명'),
    카테고리: getSelect(p, '카테고리'),
    품목코드: getRich(p, '품목코드'),
    단위: getSelect(p, '단위') || 'kg',
    포대당kg: getNum(p, '포대당kg'),
    안전재고_kg: getNum(p, '안전재고_kg') || 0,
    원산지: getSelect(p, '원산지'),
    포대색: getSelect(p, '포대색'),
  }));
}

async function loadTx(year, month, cat) {
  const y = parseInt(year), m = parseInt(month);
  const start = `${y}-${String(m).padStart(2,'0')}-01`;
  const end   = new Date(y, m, 0).toISOString().slice(0,10);

  const filters = [
    { property:'날짜', date:{ on_or_after: start } },
    { property:'날짜', date:{ on_or_before: end  } }
  ];
  if (cat) filters.push({ property:'카테고리', select:{ equals: cat } });

  const filter = filters.length === 1 ? filters[0] : { and: filters };
  TX_DATA = await notionQuery(TX_DS, filter, [{property:'날짜', direction:'ascending'}]);
}

// ============================================================
// 수불부 계산
// ============================================================
function buildSuBulBu(year, month, cat) {
  const y = parseInt(year), m = parseInt(month);
  const daysInMonth = new Date(y, m, 0).getDate();

  // 대상 원료 필터
  let rawList = cat ? MASTER.filter(r => r.카테고리 === cat) : MASTER;

  // 트랜잭션을 날짜·원료명별로 집계
  const byDayRaw = {}; // {day: {원료명: {in, used}}}
  for (const row of TX_DATA) {
    const p = row.properties;
    const dateStr = getDate(row, '날짜');
    if (!dateStr) continue;
    const day = parseInt(dateStr.slice(8,10));
    const rawNm = getRich(row, '원료명') || getTitle(row, '원료명');
    const type = getSelect(row, '구분');
    const qty = getNum(row, '수량_kg') || 0;
    if (!byDayRaw[day]) byDayRaw[day] = {};
    if (!byDayRaw[day][rawNm]) byDayRaw[day][rawNm] = {in:0, used:0};
    if (type === '입고') byDayRaw[day][rawNm].in += qty;
    else if (type === '사용(생산투입)' || type === '재고조정') byDayRaw[day][rawNm].used += qty;
  }

  // 이전 이월 재고 (이전 월 트랜잭션은 없으므로 0으로 시작)
  const carryover = {};
  rawList.forEach(r => { carryover[r.원료명] = 0; });

  // 월간 일별 행 생성 (움직임 있는 날만)
  const activeDays = new Set(Object.keys(byDayRaw).map(Number));
  const dailyRows = [];
  const running = {...carryover};

  for (let d = 1; d <= daysInMonth; d++) {
    if (!activeDays.has(d)) continue;
    const row = { day: d, data: {} };
    for (const r of rawList) {
      const nm = r.원료명;
      const inQty   = byDayRaw[d]?.[nm]?.in   || 0;
      const usedQty = byDayRaw[d]?.[nm]?.used  || 0;
      running[nm] = (running[nm] || 0) + inQty - usedQty;
      row.data[nm] = { in: inQty, used: usedQty, stock: running[nm] };
    }
    dailyRows.push(row);
  }

  // 월 합계
  const totals = {};
  rawList.forEach(r => {
    totals[r.원료명] = {in:0, used:0};
  });
  for (const row of TX_DATA) {
    const rawNm = getRich(row, '원료명') || getTitle(row, '원료명');
    const type  = getSelect(row, '구분');
    const qty   = getNum(row, '수량_kg') || 0;
    if (!totals[rawNm]) continue;
    if (type === '입고') totals[rawNm].in += qty;
    else if (type === '사용(생산투입)' || type === '재고조정') totals[rawNm].used += qty;
  }

  return { rawList, carryover, dailyRows, totals, running };
}

function renderSuBulBu(year, month, cat) {
  const { rawList, carryover, dailyRows, totals, running } = buildSuBulBu(year, month, cat);

  if (!rawList.length) {
    document.getElementById('sb-body').innerHTML = '<div class="state-box">해당 조건의 원료가 없습니다</div>';
    return;
  }

  let html = '<div class="sb-wrap"><table class="sb-table">';

  // 그룹 헤더
  html += '<thead><tr><th rowspan="2" style="text-align:left;min-width:100px">날짜</th>';
  for (const r of rawList) {
    const shortNm = r.원료명.length > 14 ? r.원료명.slice(0,14)+'…' : r.원료명;
    html += `<th colspan="3" class="group-head">${shortNm}${r.품목코드 ? ' <span style="font-weight:400;color:var(--hint)">'+r.품목코드+'</span>' : ''}</th>`;
  }
  html += '</tr><tr>';
  for (let i = 0; i < rawList.length; i++) {
    html += '<th style="color:var(--in-color)">입고</th><th style="color:var(--out-color)">사용</th><th>재고</th>';
  }
  html += '</tr></thead><tbody>';

  // 전기이월
  html += '<tr><td class="date" style="font-weight:600;color:var(--text)">전기이월</td>';
  for (const r of rawList) {
    html += `<td class="in">—</td><td class="used">—</td><td class="stock">${fmtNZ(carryover[r.원료명])}</td>`;
  }
  html += '</tr>';

  // 일별 행
  for (const row of dailyRows) {
    const mm = String(month).padStart(2,'0');
    const dd = String(row.day).padStart(2,'0');
    html += `<tr><td class="date">${mm}.${dd}</td>`;
    for (const r of rawList) {
      const d = row.data[r.원료명] || {in:0, used:0, stock:0};
      html += `<td class="in">${fmt(d.in)}</td><td class="used">${fmt(d.used)}</td><td class="stock">${fmtNZ(d.stock)}</td>`;
    }
    html += '</tr>';
  }

  // 합계행
  html += '<tr class="sum-row"><td class="date">월 합계</td>';
  for (const r of rawList) {
    const t = totals[r.원료명] || {in:0,used:0};
    html += `<td class="in">${fmtNZ(t.in)}</td><td class="used">${fmtNZ(t.used)}</td><td class="stock">${fmtNZ(running[r.원료명])}</td>`;
  }
  html += '</tr></tbody></table></div>';

  document.getElementById('sb-body').innerHTML = html;
}

// ============================================================
function renderStock() {
  // 현재고 계산 (모든 트랜잭션 합산)
  const stockMap = {};
  MASTER.forEach(r => { stockMap[r.원료명] = 0; });

  // TX_DATA는 현재 조회된 기간만 있으므로, 전체 재고는 별도 계산 필요
  // 여기서는 TX_DATA 기반으로 계산 (실제로는 전체 기간 로드 필요)
  for (const row of TX_DATA) {
    const rawNm = getRich(row, '원료명') || getTitle(row, '항목명');
    const type  = getSelect(row, '구분');
    const qty   = getNum(row, '수량_kg') || 0;
    if (stockMap[rawNm] === undefined) stockMap[rawNm] = 0;
    if (type === '입고') stockMap[rawNm] += qty;
    else stockMap[rawNm] -= qty;
  }

  // 요약 통계
  const warnList = MASTER.filter(r => stockMap[r.원료명] < r.안전재고_kg && stockMap[r.원료명] >= 0);
  const minusList = MASTER.filter(r => stockMap[r.원료명] < 0);
  document.getElementById('s-total').textContent = MASTER.length;
  document.getElementById('s-warn').textContent  = warnList.length;
  document.getElementById('s-minus').textContent = minusList.length;
  document.getElementById('s-tx').textContent    = TX_DATA.length;

  // 카테고리별 테이블
  const cats = ['두부용 대두','응고제','소포제','부원료','후라이드 전용'];
  let html = '';

  for (const cat of cats) {
    const items = MASTER.filter(r => r.카테고리 === cat);
    if (!items.length) continue;
    html += `<p class="sec-label">${cat}</p>`;
    html += '<div class="card" style="margin-bottom:12px"><table>';
    html += '<thead><tr><th style="width:200px">원료명</th>';
    const hasBag = items.some(r => r.포대당kg);
    if (hasBag) html += '<th class="num">현재고 (kg)</th><th class="num">포대수</th>';
    else html += '<th class="num">현재고 (kg)</th>';
    html += '<th class="num">안전재고</th><th>상태</th></tr></thead><tbody>';

    for (const r of items) {
      const stock = stockMap[r.원료명] ?? 0;
      const safe  = r.안전재고_kg;
      let status, pillClass;
      if (stock < 0) { status='마이너스'; pillClass='pill-danger'; }
      else if (stock < safe) { status='주의'; pillClass='pill-warn'; }
      else { status='정상'; pillClass='pill-ok'; }

      const stockColor = stock < 0 ? 'color:var(--red);font-weight:600' : '';
      const bags = r.포대당kg ? Math.floor(stock / r.포대당kg) : null;

      html += `<tr style="${stock<0?'background:var(--red-bg)':stock<safe?'background:#fef9f2':''}">`;
      html += `<td>${r.원료명}${r.품목코드 ? ' <span class="muted">('+r.품목코드+')</span>':''}${r.원산지?' <span class="muted">'+r.원산지+'</span>':''}</td>`;
      html += `<td class="num" style="${stockColor}">${stock.toLocaleString('ko-KR',{minimumFractionDigits:0,maximumFractionDigits:3})}</td>`;
      if (hasBag) html += `<td class="num muted">${bags !== null ? bags+'포' : '—'}</td>`;
      html += `<td class="num muted">${safe}kg</td>`;
      html += `<td><span class="pill ${pillClass}">${status}</span></td>`;
      html += '</tr>';
    }
    html += '</tbody></table></div>';
  }

  document.getElementById('stock-body').innerHTML = html;
}

async function saveTx() {
  const date = document.getElementById('f-date').value;
  const type = document.getElementById('f-type').value;
  const raw  = document.getElementById('f-raw').value;
  const qty  = parseFloat(document.getElementById('f-qty').value);
  const note = document.getElementById('f-note').value;
  const person = document.getElementById('f-person').value;

  if (!date || !raw || isNaN(qty) || qty <= 0) {
    toast('날짜, 원료, 수량을 입력해주세요'); return;
  }

  const rawObj = MASTER.find(r => r.원료명 === raw);
  const bags = rawObj?.포대당kg ? Math.ceil(qty / rawObj.포대당kg) : null;

  const props = {
    '항목명':   { title: [{ text: { content: `${date} ${raw}` } }] },
    '날짜':     { date: { start: date } },
    '원료명':   { rich_text: [{ text: { content: raw } }] },
    '카테고리': { select: { name: rawObj?.카테고리 || '' } },
    '구분':     { select: { name: type } },
    '수량_kg':  { number: qty },
    '비고':     { rich_text: [{ text: { content: note } }] },
    '담당자':   { rich_text: [{ text: { content: person } }] },
  };
  if (bags !== null) props['포대수'] = { number: bags };
  if (rawObj?.품목코드) props['품목코드'] = { rich_text: [{ text: { content: rawObj.품목코드 } }] };

  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = '저장 중...';
  try {
    await notionCreate(TX_DS, props);
    toast('✓ 저장 완료');
    // 폼 초기화
    document.getElementById('f-qty').value = '';
    document.getElementById('f-note').value = '';
    document.getElementById('f-raw').value = '';
    document.getElementById('bag-wrap').style.display = 'none';
  } catch(e) {
    toast('저장 실패: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '저장';
  }
}

async function createDB(title, properties) {
  const url = `${PROXY}/v1/databases`;
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + TOKEN,
      'Notion-Version': NOTION_VER,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      parent: { type: 'workspace', workspace: true },
      title: [{ type: 'text', text: { content: title } }],
      properties
    })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || 'DB 생성 오류');
  return data.id.replace(/-/g, '');
}

    { 원료명:'결두부 원물', 카테고리:'후라이드 전용', 품목코드:'9702', 안전재고_kg:50 },
    { 원료명:'염지제', 카테고리:'후라이드 전용', 품목코드:'9704', 안전재고_kg:10 },
    { 원료명:'튀김가루', 카테고리:'후라이드 전용', 품목코드:'9703', 안전재고_kg:20 },
    { 원료명:'대두유', 카테고리:'후라이드 전용', 품목코드:'5402', 안전재고_kg:10 },
  ];

  for (const item of rawItems) {
    const props = {
      '원료명':    { title: [{ text: { content: item.원료명 } }] },
      '카테고리':  { select: { name: item.카테고리 } },
      '안전재고_kg': { number: item.안전재고_kg },
    };
    if (item.포대당kg) props['포대당kg'] = { number: item.포대당kg };
    if (item.원산지)   props['원산지']   = { select: { name: item.원산지 } };
    if (item.포대색)   props['포대색']   = { select: { name: item.포대색 } };
    if (item.품목코드) props['품목코드'] = { rich_text: [{ text: { content: item.품목코드 } }] };
    props['단위'] = { select: { name: 'kg' } };

    await notionCreate(MASTER_DS, props);
  }
}

// ============================================================
// 초기 로드
// ============================================================
async function init() {
  const today_str = today();
  document.getElementById('f-date').value = today_str;

  try {
    setSync('spin', '연결 중...');

    await loadMaster();
    populateRawSelect();

    const now = new Date();
    await loadTx(now.getFullYear(), now.getMonth()+1, '');

    document.getElementById('sb-month').value = String(now.getMonth()+1);
    document.getElementById('sb-year').value  = String(now.getFullYear());

    renderStock();
    setSync('ok', `노션 연동 완료 · 원료 ${MASTER.length}종`);
  } catch(e) {
    setSync('err', '연결 오류 — 토큰을 확인해주세요');
    console.error(e);
    toast('연결 실패: ' + e.message);
  }
}

// 시작: 토큰 있으면 바로 init, 없으면 배너 표시
if (TOKEN) {
  init();
} else {
  showBanner();
  setSync('spin', '토큰을 입력해주세요');
}
</script>
